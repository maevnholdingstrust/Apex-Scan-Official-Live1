version: '3.8'

services:
  apex-omega:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-omega-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/system/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      # Optional: Persist dynamic in-memory configurations (if using file-based overrides locally)
      # Uncomment the following line if you want config.json to persist across container restarts.
      - ./config.json:/app/config.json
      - app_logs:/app/logs

volumes:
  app_logs:
